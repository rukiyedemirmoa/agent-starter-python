# Deploy config for THIS deployment (the band-namer web app).
#
# NOTE: Railway runs startCommand WITHOUT a shell, so "$PORT" would NOT expand.
# We don't pass --port at all — `fastapi run` reads the PORT env var that Railway
# injects, and already defaults --host to 0.0.0.0.
[deploy]
startCommand = "fastapi run src/agent/web.py"
